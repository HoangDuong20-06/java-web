<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{main-layout}">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa món ăn</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Cập nhật thông tin món ăn</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/bai3/update}" th:object="${dish}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mã số (ID):</label>
                            <input type="text" class="form-control bg-light" th:field="*{id}" readonly />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên món ăn:</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập tên món..." required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá bán (VNĐ):</label>
                            <input type="number" class="form-control" th:field="*{price}" required />
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Trạng thái phục vụ:</label>
                            <select class="form-select" th:field="*{available}">
                                <option th:value="true">Đang kinh doanh (Còn hàng)</option>
                                <option th:value="false">Tạm ngưng (Hết hàng)</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/bai2/dished" class="btn btn-secondary me-md-2">Quay lại</a>
                            <button type="submit" class="btn btn-primary px-4">Lưu thay đổi</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
