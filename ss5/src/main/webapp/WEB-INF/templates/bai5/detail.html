<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Chi tiết món</title>
</head>

<body>

<div layout:fragment="content">

    <h2 class="mb-4">Chi tiết món ăn</h2>
    <div th:if="${msg}" class="alert alert-success" id="alertBox">
        <span th:text="${msg}"></span>
    </div>
    <div class="card shadow-sm p-4" th:object="${dish}">
        <p><strong>ID:</strong> <span th:text="${dish.id}"></span></p>
        <p><strong>Tên:</strong> <span th:text="${dish.name}"></span></p>
        <p><strong>Giá:</strong> <span th:text="${dish.price}"></span></p>
        <form th:action="@{/bai5/order/add}" method="post">
            <input type="hidden" name="id" th:value="${dish.id}">
            <input type="hidden" name="redirectUrl"  id="redirectUrl" th:value="@{'/bai5/dished/' + ${dish.id}}">
            <button class="btn btn-success">🛒 Thêm vào giỏ</button>
        </form>
        <a class="btn btn-secondary mt-3" th:href="@{/bai5/dishes}">
            Quay lại menu
        </a>
    </div>
</div>
<script th:if="${msg}">
    setTimeout(() => {
        const alertBox = document.getElementById('alertBox');
        if (alertBox) {
            alertBox.remove();
        }
    }, 2000);
</script>
</body>
</html>
