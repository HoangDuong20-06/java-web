<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Menu</title>
</head>

<body>

<div layout:fragment="content" >
    <h2 class="mb-4">MENU NHÀ HÀNG</h2>
    <a class="btn btn-warning mb-3" th:href="@{/bai5/order}">
        🛒 Xem giỏ hàng
    </a>

    <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Tên món</th>
            <th>Giá</th>
            <th>Chi tiết</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="dish : ${dishes}">
            <td class="ps-4" th:text="${dish.id}"></td>
            <td><strong th:text="${dish.name}"></strong></td>
            <td th:text="${#numbers.formatDecimal(dish.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
            <td>
                <a class="btn btn-sm btn-primary"
                   th:href="@{'/bai5/dishes/' + ${dish.id}}">
                    Xem
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
