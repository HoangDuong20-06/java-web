<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="html_head">
    <meta charset="UTF-8">
    <style>
        table { width: 80%; border-collapse: collapse; margin: 25px auto; font-family: sans-serif; }
        th, td { padding: 12px 15px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f4f4f4; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        h2, footer { text-align: center; }
        .btn-detail { color: blue; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<header th:fragment="header">
    <h2 style="color: #2c3e50;">HỆ THỐNG QUẢN LÝ THƯ VIỆN</h2>
    <hr width="80%">
</header>

<footer th:fragment="footer">
    <hr width="80%">
    <p>&copy; 2026 - PTIT Student - WEB-INF Architecture</p>
</footer>
</body>
</html>
