<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" xmlns:th="http://www.thymeleaf.org">
    <title>Title</title>
</head>
<body>
<h1>Danh sách những người trong công viên</h1>
<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Gender</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each = " p : ${persons}" th:object="${p}">
    <td th:text="${p.id}"></td>
    <td th:text="${p.name}"></td>
    <td th:text="${p.age}"></td>
    <td th:text="${p.gender ? Name : Nữ}"></td>
  </tr>
  </tbody>
</table>
</body>
</html>
